<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Çevrimdışı — Vibe</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #FAF8F4;
      color: #1C1917;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      gap: 16px;
      text-align: center;
      padding: 24px;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin: 0; }
    p  { font-size: 0.9rem; color: #78716C; margin: 0; max-width: 300px; }
    button {
      margin-top: 8px;
      padding: 12px 24px;
      background: #D9723F;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <span style="font-size:3.5rem">📶</span>
  <h1>İnternet bağlantısı yok</h1>
  <p>Vibe'a erişmek için internet bağlantısı gerekiyor. Bağlantını kontrol et ve tekrar dene.</p>
  <button onclick="location.reload()">Tekrar Dene</button>
</body>
</html>
